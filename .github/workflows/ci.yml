name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: ci (node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
        exclude:
          # node 20 + Windows can't install the native `better-sqlite3` dep:
          # no prebuilt binary is fetched for that combo, so it falls back to a
          # source build and the runner's node-gyp can't locate MSVC
          # ("gyp ERR! find VS"). node 22 + Windows gets a prebuild and passes,
          # and node 20 builds fine on Linux/macOS, so drop only this one cell.
          # (GitHub is also sunsetting node-20 Actions runtimes.)
          - os: windows-latest
            node: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
