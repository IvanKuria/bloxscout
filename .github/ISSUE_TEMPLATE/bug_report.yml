name: Bug report
description: Report something that is broken or behaves unexpectedly.
title: "[bug]: "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. The more concrete the repro, the faster a fix can land.
  - type: textarea
    id: description
    attributes:
      label: Short description
      description: One or two sentences describing the bug.
      placeholder: "When I run `bloxscout trending --genre Simulator`, the CLI exits with..."
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered steps to reliably reproduce the bug.
      placeholder: |
        1. Install bloxscout 0.X.Y
        2. Run `bloxscout ...`
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include full error output, stack traces, or the relevant MCP server logs.
      render: shell
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Which surface is affected?
      options:
        - CLI (bloxscout)
        - MCP server (bloxscout-mcp)
        - Both
        - Not sure
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: v20.11.0
    validations:
      required: true
  - type: input
    id: bloxscout-version
    attributes:
      label: Bloxscout version
      description: Output of `npx bloxscout --version` (or the npm version installed).
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 14.5 / Ubuntu 22.04 / Windows 11
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, MCP client (Claude Code / Cursor / Windsurf / Zed), agent prompts, anything else that helps.
    validations:
      required: false
