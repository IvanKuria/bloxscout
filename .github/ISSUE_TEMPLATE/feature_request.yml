name: Feature request
description: Propose a new feature, improvement, or change.
title: "[feature]: "
labels: [enhancement, triage]
body:
  - type: markdown
    attributes:
      value: |
        For brand-new MCP tools, please use the **New MCP tool proposal** template instead — it captures the tool-design details needed to land the change quickly.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve? Who runs into it?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should Bloxscout solve this? Be as concrete as you can.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you didn't pick them.
    validations:
      required: false
  - type: textarea
    id: use-case
    attributes:
      label: Use case / who benefits
      description: A concrete example. Is the user a human at a terminal? An LLM agent? A studio doing competitive analysis?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What does "done" look like? Bulleted list works well.
    validations:
      required: false
