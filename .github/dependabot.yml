version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    reviewers:
      - IvanKuria
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope
    groups:
      types:
        patterns:
          - "@types/*"
      dev-dependencies:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    reviewers:
      - IvanKuria
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope
